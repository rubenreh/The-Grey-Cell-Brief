backend:
  name: github
  repo: rubenreh/The-Grey-Cell-Brief
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "fieldnotes"
    label: "Field Notes"
    folder: "content/fieldnotes"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Image", name: "image", widget: "image" }
      - { label: "Content", name: "body", widget: "markdown" }
  - name: "about"
    label: "About Page"
    files:
      - label: "About the Brief"
        name: "about"
        file: "content/about.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
  - name: "site"
    label: "Site Settings"
    files:
      - label: "Active Users"
        name: "activeusers"
        file: "content/activeusers.json"
        fields:
          - { label: "Active Users", name: "active", widget: "number" }
