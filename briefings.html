    <style>
        .briefings-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2.5rem;
            padding: 2.5rem;
        }

        .briefing-card {
            background: linear-gradient(135deg, #23272f 60%, #313a4d 100%);
            padding: 3rem 2.5rem;
            border-radius: 18px;
            transition: transform 0.3s, box-shadow 0.3s, background 0.3s;
            text-decoration: none;
            color: #fff;
            position: relative;
            min-height: 220px;
            box-shadow: 0 6px 32px 0 rgba(0,0,0,0.18), 0 1.5px 6px 0 rgba(60,60,80,0.10);
            border: 2px solid #3a4152;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .briefing-card:hover {
            transform: translateY(-8px) scale(1.03);
            background: linear-gradient(135deg, #2d3340 60%, #42506b 100%);
            box-shadow: 0 12px 40px 0 rgba(0,0,0,0.22), 0 2px 8px 0 rgba(60,60,80,0.13);
            border-color: #5a6b8a;
        }

        .briefing-card h3 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            margin-right: 2rem;
        }

        .briefing-card .date {
            color: #b6c2d1;
            font-size: 1.1rem;
            margin-bottom: 1.2rem;
        }

        .briefing-card .arrow {
            position: absolute;
            right: 2.5rem;
            bottom: 2.5rem;
            font-size: 2rem;
            transition: transform 0.3s;
        }

        .briefing-card:hover .arrow {
            transform: translateX(12px);
        }

        @media (max-width: 1200px) {
            .briefings-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 900px) {
            .briefings-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .briefings-grid {
                grid-template-columns: 1fr;
            }
            .briefing-card {
                padding: 2rem 1.2rem;
                min-height: 160px;
            }
        }
    </style>

    <script>
        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCl4-CR0cDcInzgWnGJMPDHbBn6L1bWlRs",
            authDomain: "grey-cell-brief.firebaseapp.com",
            projectId: "grey-cell-brief",
            storageBucket: "grey-cell-brief.firebasestorage.app",
            messagingSenderId: "479300831529",
            appId: "1:479300831529:web:b295eb7803433fa69acf38",
            measurementId: "G-6GCYXKL6N0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Load all field notes from Firestore
        function loadAllFieldNotes() {
            const briefingsGrid = document.getElementById('briefingsGrid');
            briefingsGrid.innerHTML = '';
            
            db.collection('fieldNotes').orderBy('date', 'desc').get().then((querySnapshot) => {
                querySnapshot.forEach((doc) => {
                    const note = doc.data();
                    const card = document.createElement('a');
                    card.href = `field-note-template.html?id=${doc.id}`;
                    card.className = 'briefing-card';
                    card.innerHTML = `
                        <h3>${note.title}</h3>
                        <div class="date">${new Date(note.date).toLocaleDateString('en-US', {
                            year: 'numeric',
                            month: 'long',
                            day: 'numeric'
                        })}</div>
                        <div class="arrow">→</div>
                    `;
                    briefingsGrid.appendChild(card);
                });
            }).catch((error) => {
                console.error('Error loading field notes:', error);
                briefingsGrid.innerHTML = '<p>Error loading field notes. Please try again later.</p>';
            });
        }

        // Load field notes when the page loads
        document.addEventListener('DOMContentLoaded', loadAllFieldNotes);
    </script>
