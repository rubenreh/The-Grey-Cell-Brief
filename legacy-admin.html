<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - The Grey Cell Brief</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Firebase App (the core Firebase SDK) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <!-- Add Firestore -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyCl4-CR0cDcInzgWnGJMPDHbBn6L1bWlRs",
        authDomain: "grey-cell-brief.firebaseapp.com",
        projectId: "grey-cell-brief",
        storageBucket: "grey-cell-brief.firebasestorage.app",
        messagingSenderId: "479300831529",
        appId: "1:479300831529:web:b295eb7803433fa69acf38",
        measurementId: "G-6GCYXKL6N0"
      };
      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();
    </script>
    <style>
      /* ... your CSS from before ... */
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo"><a href="index.html">THE GREY CELL BRIEF</a></div>
            <div class="nav-links">
                <a href="index.html">HOME</a>
            </div>
        </nav>
    </header>
    <main class="admin-main">
        <h1>Admin Panel</h1>
        <div class="admin-tabs hidden" id="adminTabs">
            <button class="tab-btn active" onclick="showTab('fieldNotesTab')">Field Notes</button>
            <button class="tab-btn" onclick="showTab('aboutTab')">About Page</button>
            <button class="tab-btn" onclick="showTab('activeUsersTab')">Active Users</button>
        </div>
        <section id="fieldNotesTab" class="admin-section">
            <div id="loginSection" class="login-form">
                <h2>Admin Login</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit" class="submit-button">Login</button>
                </form>
            </div>
            <div id="adminSection" class="hidden">
                <h2>Manage Field Notes</h2>
                <form id="fieldNoteForm" class="field-note-form">
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input type="text" id="title" name="title" required>
                    </div>
                    <div class="form-group">
                        <label for="date">Publication Date</label>
                        <input type="date" id="date" name="date" required>
                    </div>
                    <div class="form-group">
                        <label for="image">Featured Image</label>
                        <input type="file" id="image" name="image" accept="image/*">
                        <div id="imagePreview" style="margin-top:1rem;"></div>
                    </div>
                    <div class="form-group">
                        <label for="content">Content</label>
                        <textarea id="content" name="content" required></textarea>
                    </div>
                    <button type="submit" class="submit-button">Save Field Note</button>
                </form>
                <div class="field-notes-list" id="fieldNotesList" style="margin-top:2.5rem;">
                    <!-- Field notes will be listed here -->
                </div>
            </div>
        </section>
        <section id="aboutTab" class="admin-section hidden">
            <div id="aboutAdminSection" class="hidden">
                <h2>Edit About Page</h2>
                <div id="aboutBlocks"></div>
                <button onclick="addAboutBlock()" class="add-block-btn">Add Block</button>
            </div>
        </section>
        <section id="activeUsersTab" class="admin-section hidden">
            <h2>Set Active Users</h2>
            <form id="activeUsersForm" style="max-width:400px;margin:2rem auto 0 auto;">
                <div class="form-group">
                    <label for="activeUsersCount">Active Users</label>
                    <input type="number" id="activeUsersCount" name="activeUsersCount" min="0" style="font-size:1.5rem;padding:0.7rem;">
                </div>
                <button type="submit" class="submit-button">Save Active Users</button>
            </form>
            <div id="activeUsersSavedMsg" style="text-align:center;color:#4caf50;font-weight:600;margin-top:1rem;display:none;">Saved!</div>
        </section>
    </main>
    <script>
        // Simple authentication (replace with proper authentication in production)
        const ADMIN_USERNAME = 'admin';
        const ADMIN_PASSWORD = 'greycell2024';

        // Field Notes Tab Login
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('adminSection').classList.remove('hidden');
                document.getElementById('adminTabs').classList.remove('hidden');
                document.getElementById('aboutAdminSection').classList.remove('hidden');
                loadFieldNotes();
                loadAboutBlocks();
                loadActiveUsers();
            } else {
                alert('Invalid credentials');
            }
        });

        // Tab switching
        function showTab(tabId) {
            document.getElementById('fieldNotesTab').classList.add('hidden');
            document.getElementById('aboutTab').classList.add('hidden');
            document.getElementById('activeUsersTab').classList.add('hidden');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if (tabId === 'fieldNotesTab') {
                document.getElementById('fieldNotesTab').classList.remove('hidden');
                document.querySelector('.tab-btn[onclick*="fieldNotesTab"]').classList.add('active');
            } else if (tabId === 'aboutTab') {
                document.getElementById('aboutTab').classList.remove('hidden');
                document.querySelector('.tab-btn[onclick*="aboutTab"]').classList.add('active');
            } else if (tabId === 'activeUsersTab') {
                document.getElementById('activeUsersTab').classList.remove('hidden');
                document.querySelector('.tab-btn[onclick*="activeUsersTab"]').classList.add('active');
                loadActiveUsers();
            }
        }

        // --- FIELD NOTES (Firestore) ---
        let editingId = null;
        async function loadFieldNotes() {
            const fieldNotesList = document.getElementById('fieldNotesList');
            fieldNotesList.innerHTML = '';
            const snapshot = await db.collection('fieldnotes').orderBy('date', 'desc').get();
            snapshot.forEach(doc => {
                const note = doc.data();
                const noteElement = document.createElement('div');
                noteElement.className = 'field-note-item';
                noteElement.innerHTML = `
                    <h3>${note.title}</h3>
                    <div class="field-note-actions">
                        <button class="edit-button" onclick="editFieldNote('${doc.id}')">Edit</button>
                        <button class="delete-button" onclick="deleteFieldNote('${doc.id}')">Delete</button>
                    </div>
                `;
                fieldNotesList.appendChild(noteElement);
            });
        }

        document.getElementById('fieldNoteForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const date = document.getElementById('date').value;
            const imageInput = document.getElementById('image');
            const imageFile = imageInput.files[0];
            const content = document.getElementById('content').value;

            function saveNote(imageData) {
                if (editingId) {
                    // Update existing note
                    db.collection('fieldnotes').doc(editingId).update({
                        title, date, image: imageData !== null ? imageData : window._editingImage, content
                    }).then(() => {
                        editingId = null;
                        window._editingImage = null;
                        loadFieldNotes();
                        resetFieldNoteForm();
                    });
                } else {
                    // Add new note
                    db.collection('fieldnotes').add({
                        title, date, image: imageData, content
                    }).then(() => {
                        loadFieldNotes();
                        resetFieldNoteForm();
                    });
                }
            }

            if (editingId && !imageFile) {
                saveNote(null);
            } else if (imageFile) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    saveNote(event.target.result);
                };
                reader.readAsDataURL(imageFile);
            } else {
                saveNote('');
            }
        });

        function resetFieldNoteForm() {
            document.getElementById('fieldNoteForm').reset();
            document.querySelector('#fieldNoteForm button[type=\"submit\"]').textContent = 'Save Field Note';
            document.getElementById('title').value = '';
            document.getElementById('date').value = '';
            document.getElementById('content').value = '';
            document.getElementById('image').value = '';
            document.getElementById('imagePreview').innerHTML = '';
        }

        async function editFieldNote(id) {
            const doc = await db.collection('fieldnotes').doc(id).get();
            const note = doc.data();
            document.getElementById('title').value = note.title;
            document.getElementById('date').value = note.date;
            document.getElementById('content').value = note.content;
            const imagePreview = document.getElementById('imagePreview');
            imagePreview.innerHTML = note.image ? `<img src=\"${note.image}\" alt=\"Current Image\" style=\"max-width:180px;max-height:120px;border-radius:6px;\">` : '';
            document.getElementById('image').value = '';
            editingId = id;
            window._editingImage = note.image;
            document.querySelector('#fieldNoteForm button[type=\"submit\"]').textContent = 'Save Changes';
        }

        async function deleteFieldNote(id) {
            if (confirm('Are you sure you want to delete this field note?')) {
                await db.collection('fieldnotes').doc(id).delete();
                loadFieldNotes();
            }
        }

        // --- ABOUT PAGE BLOCKS (Firestore) ---
        async function loadAboutBlocks() {
            const container = document.getElementById('aboutBlocks');
            container.innerHTML = '';
            const snapshot = await db.collection('aboutblocks').orderBy('order', 'asc').get();
            snapshot.forEach((doc, idx) => {
                const block = doc.data();
                const blockDiv = document.createElement('div');
                blockDiv.className = 'about-block-editor';
                blockDiv.style.background = idx % 2 === 0 ? '#f5f5f5' : '#e0e4ea';
                blockDiv.innerHTML = `
                    <div class="block-controls">
                        <button onclick="moveAboutBlock('${doc.id}', -1)">↑</button>
                        <button onclick="moveAboutBlock('${doc.id}', 1)">↓</button>
                        <button onclick="deleteAboutBlock('${doc.id}')">Delete</button>
                    </div>
                    <div class="block-fields">
                        <label>Image: <input type="file" accept="image/*" onchange="uploadAboutImage(event, '${doc.id}')"></label>
                        <label>Image Position:
                            <select onchange="updateAboutBlockField('${doc.id}', 'imagePosition', this.value)">
                                <option value="left" ${block.imagePosition==='left'?'selected':''}>Left</option>
                                <option value="right" ${block.imagePosition==='right'?'selected':''}>Right</option>
                                <option value="top" ${block.imagePosition==='top'?'selected':''}>Top</option>
                                <option value="none" ${!block.image?'selected':''}>None</option>
                            </select>
                        </label>
                        <label>Image Size:
                            <select onchange="updateAboutBlockField('${doc.id}', 'imageSize', this.value)">
                                <option value="small" ${block.imageSize==='small'?'selected':''}>Small</option>
                                <option value="medium" ${block.imageSize==='medium'?'selected':''}>Medium</option>
                                <option value="large" ${block.imageSize==='large'?'selected':''}>Large</option>
                            </select>
                        </label>
                        <label>Title: <input type="text" value="${block.title||''}" onchange="updateAboutBlockField('${doc.id}', 'title', this.value)"></label>
                        <label>Subtitle: <input type="text" value="${block.subtitle||''}" onchange="updateAboutBlockField('${doc.id}', 'subtitle', this.value)"></label>
                        <label>Body Text:<br><textarea onchange="updateAboutBlockField('${doc.id}', 'body', this.value)">${block.body||''}</textarea></label>
                        <label>Block Color:
                            <select onchange="updateAboutBlockField('${doc.id}', 'bgColor', this.value)">
                                <option value="#111" ${block.bgColor==='#111'?'selected':''}>Black</option>
                                <option value="#1a2233" ${block.bgColor==='#1a2233'?'selected':''}>Dark Blue</option>
                                <option value="#23272f" ${block.bgColor==='#23272f'?'selected':''}>Dark Grey</option>
                                <option value="#f5f5f5" ${block.bgColor==='#f5f5f5'?'selected':''}>Light Grey</option>
                                <option value="#fff" ${block.bgColor==='#fff'?'selected':''}>White</option>
                            </select>
                        </label>
                    </div>
                    <div class="block-preview" style="background:${block.bgColor||'#23272f'};color:${block.bgColor==='#fff'||block.bgColor==='#f5f5f5'?'#23272f':'#fff'};">
                        <strong>Preview:</strong>
                        <div style="display:flex;flex-direction:${block.imagePosition==='top'?'column':block.imagePosition==='right'?'row-reverse':'row'};align-items:center;gap:1.5rem;">
                            ${block.image ? `<img src=\"${block.image}\" style=\"max-width:${block.imageSize==='small'?'120px':block.imageSize==='large'?'320px':'200px'};max-height:180px;border-radius:8px;\">` : ''}
                            <div>
                                ${block.title ? `<div style=\"font-size:1.5rem;font-weight:bold;\">${block.title}</div>` : ''}
                                ${block.subtitle ? `<div style=\"font-size:1.1rem;font-weight:500;color:#666;\">${block.subtitle}</div>` : ''}
                                ${block.body ? `<div style=\"margin-top:0.5rem;\">${block.body.replace(/\\n/g,'<br>')}</div>` : ''}
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(blockDiv);
            });
        }
        async function addAboutBlock() {
            const snapshot = await db.collection('aboutblocks').orderBy('order', 'desc').limit(1).get();
            let order = 0;
            if (!snapshot.empty) {
                order = snapshot.docs[0].data().order + 1;
            }
            await db.collection('aboutblocks').add({
                image: '', imagePosition: 'left', imageSize: 'medium', title: '', subtitle: '', body: '', bgColor: '#23272f', order
            });
            loadAboutBlocks();
        }
        function updateAboutBlockField(id, field, value) {
            db.collection('aboutblocks').doc(id).update({ [field]: value }).then(loadAboutBlocks);
        }
        function uploadAboutImage(event, id) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                updateAboutBlockField(id, 'image', e.target.result);
            };
            reader.readAsDataURL(file);
        }
        function deleteAboutBlock(id) {
            db.collection('aboutblocks').doc(id).delete().then(loadAboutBlocks);
        }
        async function moveAboutBlock(id, dir) {
            const blocks = [];
            const snapshot = await db.collection('aboutblocks').orderBy('order', 'asc').get();
            snapshot.forEach(doc => blocks.push({ id: doc.id, ...doc.data() }));
            const idx = blocks.findIndex(b => b.id === id);
            if ((dir === -1 && idx === 0) || (dir === 1 && idx === blocks.length-1)) return;
            const swapIdx = idx + dir;
            const thisOrder = blocks[idx].order;
            const swapOrder = blocks[swapIdx].order;
            await db.collection('aboutblocks').doc(blocks[idx].id).update({ order: swapOrder });
            await db.collection('aboutblocks').doc(blocks[swapIdx].id).update({ order: thisOrder });
            loadAboutBlocks();
        }

        // --- ACTIVE USERS (Firestore) ---
        async function loadActiveUsers() {
            const doc = await db.collection('site').doc('activeusers').get();
            if (doc.exists) {
                document.getElementById('activeUsersCount').value = doc.data().active || 0;
            }
        }
        document.getElementById('activeUsersForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const val = parseInt(document.getElementById('activeUsersCount').value, 10) || 0;
            await db.collection('site').doc('activeusers').set({ active: val });
            document.getElementById('activeUsersSavedMsg').style.display = '';
            setTimeout(() => {
                document.getElementById('activeUsersSavedMsg').style.display = 'none';
            }, 1500);
        });
    </script>
</body>
</html>
