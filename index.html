<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Grey Cell Brief</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Firebase App (the core Firebase SDK) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <!-- Add Firestore -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyCl4-CR0cDcInzgWnGJMPDHbBn6L1bWlRs",
        authDomain: "grey-cell-brief.firebaseapp.com",
        projectId: "grey-cell-brief",
        storageBucket: "grey-cell-brief.firebasestorage.app",
        messagingSenderId: "479300831529",
        appId: "1:479300831529:web:b295eb7803433fa69acf38",
        measurementId: "G-6GCYXKL6N0"
      };
      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();
    </script>
</head>
<body>
    <!-- ... your header/nav ... -->

    <main>
        <!-- ... your hero and other sections ... -->

        <section id="briefings" class="featured">
            <h2>Featured Briefings</h2>
            <div class="briefing-cards" id="briefingCards">
                <!-- Field notes will be loaded here -->
            </div>
        </section>

        <!-- ... other sections ... -->
    </main>

    <footer>
        <div class="footer-content">
            <!-- ... your footer ... -->
        </div>
        <div id="activeUsersFooter" style="text-align:right;color:#b6c2d1;font-size:1rem;margin-top:0.5rem;"></div>
    </footer>
    <script>
    // Load 3 most recent field notes from Firestore
    async function loadFieldNotes() {
        const briefingCards = document.getElementById('briefingCards');
        briefingCards.innerHTML = '';
        const snapshot = await db.collection('fieldnotes').orderBy('date', 'desc').limit(3).get();
        snapshot.forEach(doc => {
            const note = doc.data();
            const card = document.createElement('a');
            card.href = `field-note-template.html?id=${doc.id}`;
            card.className = 'card';
            card.innerHTML = `
                <h3>${note.title}</h3>
                <div class="arrow">→</div>
            `;
            briefingCards.appendChild(card);
        });
    }
    // Show active users in the footer
    async function showActiveUsersFooter() {
        const footer = document.getElementById('activeUsersFooter');
        const doc = await db.collection('site').doc('activeusers').get();
        if (doc.exists && doc.data().active) {
            footer.textContent = `Active Users: ${doc.data().active}`;
        } else {
            footer.textContent = '';
        }
    }
    document.addEventListener('DOMContentLoaded', () => {
        loadFieldNotes();
        showActiveUsersFooter();
    });
    </script>
</body>
</html>
