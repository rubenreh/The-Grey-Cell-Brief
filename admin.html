<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - The Grey Cell Brief</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Firebase App (the core Firebase SDK) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <!-- Add Firestore -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
    <style>
        .admin-main {
            max-width: 900px;
            margin: 0 auto;
            padding: 160px 20px 60px;
        }
        .admin-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .tab-btn {
            background: #23272f;
            color: #fff;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 6px 6px 0 0;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            outline: none;
        }
        .tab-btn.active {
            background: #fff;
            color: #23272f;
            border-bottom: 2px solid #fff;
        }
        .admin-section {
            background: #2a2a2a;
            border-radius: 0 0 8px 8px;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        .about-block-editor {
            margin-bottom: 2rem;
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
        }
        .block-controls {
            margin-bottom: 1rem;
        }
        .block-controls button {
            margin-right: 0.5rem;
            background: #e0e4ea;
            border: none;
            border-radius: 4px;
            padding: 0.4rem 0.8rem;
            font-size: 1rem;
            cursor: pointer;
        }
        .block-fields label {
            display: block;
            margin-bottom: 0.7rem;
            color: #23272f;
        }
        .block-fields input[type="text"], .block-fields textarea, .block-fields select {
            width: 100%;
            margin-top: 0.2rem;
            margin-bottom: 0.5rem;
            padding: 0.5rem;
            border-radius: 4px;
            border: 1px solid #bbb;
            font-size: 1rem;
        }
        .block-fields textarea {
            min-height: 600px;
            resize: vertical;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        .block-preview {
            margin-top: 1.2rem;
            background: #fff;
            border-radius: 6px;
            padding: 1rem;
        }
        .add-block-btn {
            background: #23272f;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 0.8rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }
        .add-block-btn:hover {
            background: #3a4152;
        }
        .hidden {
            display: none !important;
        }
        .submit-button {
            background-color: #ffffff;
            color: #1a1a1a;
            border: none;
            padding: 1.4rem 3.5rem;
            font-size: 1.35rem;
            font-weight: 700;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .edit-button, .delete-button {
            padding: 1rem 2.2rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.15rem;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo"><a href="index.html">THE GREY CELL BRIEF</a></div>
            <div class="nav-links">
                <a href="index.html">HOME</a>
            </div>
        </nav>
    </header>

    <main class="admin-main">
        <h1>Admin Panel</h1>
        <div class="admin-tabs hidden" id="adminTabs">
            <button class="tab-btn active" onclick="showTab('fieldNotesTab')">Field Notes</button>
            <button class="tab-btn" onclick="showTab('aboutTab')">About Page</button>
            <button class="tab-btn" onclick="showTab('activeUsersTab')">Active Users</button>
        </div>
        <section id="fieldNotesTab" class="admin-section">
            <div id="loginSection" class="login-form">
                <h2>Admin Login</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit" class="submit-button">Login</button>
                </form>
            </div>
            <div id="adminSection" class="hidden">
                <h2>Manage Field Notes</h2>
                <form id="fieldNoteForm" class="field-note-form">
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input type="text" id="title" name="title" required>
                    </div>
                    <div class="form-group">
                        <label for="date">Publication Date</label>
                        <input type="date" id="date" name="date" required>
                    </div>
                    <div class="form-group">
                        <label for="image">Featured Image</label>
                        <input type="file" id="image" name="image" accept="image/*">
                        <div id="imagePreview" style="margin-top:1rem;"></div>
                    </div>
                    <div class="form-group">
                        <label for="content">Content</label>
                        <textarea id="content" name="content" required></textarea>
                    </div>
                    <button type="submit" class="submit-button">Save Field Note</button>
                </form>
                <div class="field-notes-list" id="fieldNotesList" style="margin-top:2.5rem;">
                    <!-- Field notes will be listed here -->
                </div>
            </div>
        </section>
        <section id="aboutTab" class="admin-section hidden">
            <div id="aboutAdminSection" class="hidden">
                <h2>Edit About Page</h2>
                <div id="aboutBlocks"></div>
                <button onclick="addAboutBlock()" class="add-block-btn">Add Block</button>
            </div>
        </section>
        <section id="activeUsersTab" class="admin-section hidden">
            <h2>Set Active Users</h2>
            <form id="activeUsersForm" style="max-width:400px;margin:2rem auto 0 auto;">
                <div class="form-group">
                    <label for="activeUsersCount">Active Users</label>
                    <input type="number" id="activeUsersCount" name="activeUsersCount" min="0" style="font-size:1.5rem;padding:0.7rem;">
                </div>
                <button type="submit" class="submit-button">Save Active Users</button>
            </form>
            <div id="activeUsersSavedMsg" style="text-align:center;color:#4caf50;font-weight:600;margin-top:1rem;display:none;">Saved!</div>
        </section>
    </main>

    <script>
        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCl4-CR0cDcInzgWnGJMPDHbBn6L1bWlRs",
            authDomain: "grey-cell-brief.firebaseapp.com",
            projectId: "grey-cell-brief",
            storageBucket: "grey-cell-brief.firebasestorage.app",
            messagingSenderId: "479300831529",
            appId: "1:479300831529:web:b295eb7803433fa69acf38",
            measurementId: "G-6GCYXKL6N0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        // Simple authentication (replace with proper authentication in production)
        const ADMIN_USERNAME = 'admin';
        const ADMIN_PASSWORD = 'greycell2024';

        // Field Notes Tab Login
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('adminSection').classList.remove('hidden');
                document.getElementById('adminTabs').classList.remove('hidden');
                document.getElementById('aboutAdminSection').classList.remove('hidden');
                loadFieldNotes();
                loadAboutBlocks();
            } else {
                alert('Invalid credentials');
            }
        });

        // Tab switching
        function showTab(tabId) {
            document.getElementById('fieldNotesTab').classList.add('hidden');
            document.getElementById('aboutTab').classList.add('hidden');
            document.getElementById('activeUsersTab').classList.add('hidden');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if (tabId === 'fieldNotesTab') {
                document.getElementById('fieldNotesTab').classList.remove('hidden');
                document.querySelector('.tab-btn[onclick*="fieldNotesTab"]').classList.add('active');
            } else if (tabId === 'aboutTab') {
                document.getElementById('aboutTab').classList.remove('hidden');
                document.querySelector('.tab-btn[onclick*="aboutTab"]').classList.add('active');
            } else if (tabId === 'activeUsersTab') {
                document.getElementById('activeUsersTab').classList.remove('hidden');
                document.querySelector('.tab-btn[onclick*="activeUsersTab"]').classList.add('active');
                // Load current value
                db.collection('settings').doc('activeUsers').get().then((doc) => {
                    if (doc.exists) {
                        document.getElementById('activeUsersCount').value = doc.data().count;
                    }
                });
                document.getElementById('activeUsersSavedMsg').style.display = 'none';
            }
        }

        // Load existing field notes
        function loadFieldNotes() {
            const fieldNotesList = document.getElementById('fieldNotesList');
            fieldNotesList.innerHTML = '';

            db.collection('fieldNotes').orderBy('date', 'desc').get().then((querySnapshot) => {
                querySnapshot.forEach((doc, index) => {
                    const note = doc.data();
                    const noteElement = document.createElement('div');
                    noteElement.className = 'field-note-item';
                    noteElement.innerHTML = `
                        <h3>${note.title}</h3>
                        <div class="field-note-actions">
                            <button class="edit-button" onclick="editFieldNote('${doc.id}')">Edit</button>
                            <button class="delete-button" onclick="deleteFieldNote('${doc.id}')">Delete</button>
                        </div>
                    `;
                    fieldNotesList.appendChild(noteElement);
                });
            });
        }

        // Save new or edited field note
        let editingId = null;
        document.getElementById('fieldNoteForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const date = document.getElementById('date').value;
            const imageInput = document.getElementById('image');
            const imageFile = imageInput.files[0];
            const content = document.getElementById('content').value;

            try {
                let imageUrl = '';
                if (imageFile) {
                    const storageRef = storage.ref();
                    const imageRef = storageRef.child(`field-notes/${Date.now()}_${imageFile.name}`);
                    await imageRef.put(imageFile);
                    imageUrl = await imageRef.getDownloadURL();
                }

                const noteData = {
                    title,
                    date,
                    content,
                    image: imageUrl,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                if (editingId) {
                    // Update existing note
                    await db.collection('fieldNotes').doc(editingId).update(noteData);
                    editingId = null;
                } else {
                    // Add new note
                    await db.collection('fieldNotes').add(noteData);
                }

                loadFieldNotes();
                document.getElementById('fieldNoteForm').reset();
                document.querySelector('#fieldNoteForm button[type="submit"]').textContent = 'Save Field Note';
                document.getElementById('imagePreview').innerHTML = '';
            } catch (error) {
                console.error('Error saving field note:', error);
                alert('Error saving field note. Please try again.');
            }
        });

        // Edit field note
        function editFieldNote(id) {
            db.collection('fieldNotes').doc(id).get().then((doc) => {
                if (doc.exists) {
                    const note = doc.data();
                    document.getElementById('title').value = note.title;
                    document.getElementById('date').value = note.date;
                    document.getElementById('content').value = note.content;
                    const imagePreview = document.getElementById('imagePreview');
                    imagePreview.innerHTML = note.image ? `<img src="${note.image}" alt="Current Image" style="max-width:180px;max-height:120px;border-radius:6px;">` : '';
                    document.getElementById('image').value = '';
                    editingId = id;
                    document.querySelector('#fieldNoteForm button[type="submit"]').textContent = 'Save Changes';
                }
            });
        }

        // Delete field note
        function deleteFieldNote(id) {
            if (confirm('Are you sure you want to delete this field note?')) {
                db.collection('fieldNotes').doc(id).delete().then(() => {
                    loadFieldNotes();
                }).catch((error) => {
                    console.error('Error deleting field note:', error);
                    alert('Error deleting field note. Please try again.');
                });
            }
        }

        // About Page Block Editor
        function loadAboutBlocks() {
            const aboutBlocks = document.getElementById('aboutBlocks');
            aboutBlocks.innerHTML = '';

            db.collection('aboutBlocks').orderBy('order').get().then((querySnapshot) => {
                querySnapshot.forEach((doc, idx) => {
                    const block = doc.data();
                    const blockDiv = document.createElement('div');
                    blockDiv.className = 'about-block';
                    blockDiv.innerHTML = `
                        <div class="block-header">
                            <h3>Block ${idx + 1}</h3>
                            <div class="block-actions">
                                <button onclick="moveAboutBlock('${doc.id}', -1)">↑</button>
                                <button onclick="moveAboutBlock('${doc.id}', 1)">↓</button>
                                <button onclick="deleteAboutBlock('${doc.id}')">Delete</button>
                            </div>
                        </div>
                        <div class="block-fields">
                            <label>Image: <input type="file" accept="image/*" onchange="uploadAboutImage(event, '${doc.id}')"></label>
                            <label>Image Position:
                                <select onchange="updateAboutBlockField('${doc.id}', 'imagePosition', this.value)">
                                    <option value="left" ${block.imagePosition==='left'?'selected':''}>Left</option>
                                    <option value="right" ${block.imagePosition==='right'?'selected':''}>Right</option>
                                    <option value="top" ${block.imagePosition==='top'?'selected':''}>Top</option>
                                    <option value="none" ${!block.image?'selected':''}>None</option>
                                </select>
                            </label>
                            <label>Image Size:
                                <select onchange="updateAboutBlockField('${doc.id}', 'imageSize', this.value)">
                                    <option value="small" ${block.imageSize==='small'?'selected':''}>Small</option>
                                    <option value="medium" ${block.imageSize==='medium'?'selected':''}>Medium</option>
                                    <option value="large" ${block.imageSize==='large'?'selected':''}>Large</option>
                                </select>
                            </label>
                            <label>Title: <input type="text" value="${block.title||''}" onchange="updateAboutBlockField('${doc.id}', 'title', this.value)"></label>
                            <label>Subtitle: <input type="text" value="${block.subtitle||''}" onchange="updateAboutBlockField('${doc.id}', 'subtitle', this.value)"></label>
                            <label>Body Text:<br><textarea onchange="updateAboutBlockField('${doc.id}', 'body', this.value)">${block.body||''}</textarea></label>
                        </div>
                    `;
                    aboutBlocks.appendChild(blockDiv);
                });
            });
        }

        function addAboutBlock() {
            db.collection('aboutBlocks').orderBy('order', 'desc').limit(1).get().then((querySnapshot) => {
                let newOrder = 0;
                if (!querySnapshot.empty) {
                    newOrder = querySnapshot.docs[0].data().order + 1;
                }
                db.collection('aboutBlocks').add({
                    image: '',
                    imagePosition: 'left',
                    imageSize: 'medium',
                    title: '',
                    subtitle: '',
                    body: '',
                    order: newOrder
                }).then(() => {
                    loadAboutBlocks();
                });
            });
        }

        function updateAboutBlockField(id, field, value) {
            db.collection('aboutBlocks').doc(id).update({
                [field]: value
            }).then(() => {
                loadAboutBlocks();
            });
        }

        async function uploadAboutImage(event, id) {
            const file = event.target.files[0];
            if (!file) return;

            try {
                const storageRef = storage.ref();
                const imageRef = storageRef.child(`about-blocks/${Date.now()}_${file.name}`);
                await imageRef.put(file);
                const imageUrl = await imageRef.getDownloadURL();
                await db.collection('aboutBlocks').doc(id).update({
                    image: imageUrl
                });
                loadAboutBlocks();
            } catch (error) {
                console.error('Error uploading image:', error);
                alert('Error uploading image. Please try again.');
            }
        }

        function deleteAboutBlock(id) {
            if (confirm('Are you sure you want to delete this block?')) {
                db.collection('aboutBlocks').doc(id).delete().then(() => {
                    loadAboutBlocks();
                });
            }
        }

        function moveAboutBlock(id, dir) {
            db.collection('aboutBlocks').doc(id).get().then((doc) => {
                const currentOrder = doc.data().order;
                const newOrder = currentOrder + dir;

                db.collection('aboutBlocks').where('order', '==', newOrder).get().then((querySnapshot) => {
                    if (!querySnapshot.empty) {
                        const otherDoc = querySnapshot.docs[0];
                        db.collection('aboutBlocks').doc(otherDoc.id).update({
                            order: currentOrder
                        }).then(() => {
                            db.collection('aboutBlocks').doc(id).update({
                                order: newOrder
                            }).then(() => {
                                loadAboutBlocks();
                            });
                        });
                    }
                });
            });
        }

        // Active Users form logic
        document.getElementById('activeUsersForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const count = document.getElementById('activeUsersCount').value;
            
            db.collection('settings').doc('activeUsers').set({
                count: parseInt(count)
            }).then(() => {
                document.getElementById('activeUsersSavedMsg').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('activeUsersSavedMsg').style.display = 'none';
                }, 2000);
            }).catch((error) => {
                console.error('Error saving active users:', error);
                alert('Error saving active users count. Please try again.');
            });
        });
    </script>
</body>
</html>
