    <script>
    // Render About Page Blocks from Firestore
    async function renderAboutBlocks() {
        const container = document.getElementById('aboutPageContent');
        // Keep the title, clear only blocks
        container.innerHTML = container.querySelector('.page-title')?.outerHTML || '';
        const snapshot = await db.collection('aboutblocks').orderBy('order', 'asc').get();
        snapshot.forEach((doc, idx) => {
            const block = doc.data();
            const bg = block.bgColor || '#23272f';
            const textColor = (bg === '#fff' || bg === '#f5f5f5') ? '#23272f' : '#fff';
            const section = document.createElement('section');
            section.style.background = bg;
            section.style.color = textColor;
            section.style.padding = '4rem 0';
            section.style.margin = '0';
            section.style.width = '100vw';
            section.style.position = 'relative';
            section.style.left = '50%';
            section.style.right = '50%';
            section.style.marginLeft = '-50vw';
            section.style.marginRight = '-50vw';
            // Block layout
            let flexDir = 'row';
            if (block.imagePosition === 'top') flexDir = 'column';
            if (block.imagePosition === 'right') flexDir = 'row-reverse';
            if (!block.image) flexDir = 'column';
            const blockDiv = document.createElement('div');
            blockDiv.style.display = 'flex';
            blockDiv.style.flexDirection = flexDir;
            blockDiv.style.alignItems = 'center';
            blockDiv.style.gap = '2.5rem';
            blockDiv.style.maxWidth = '1100px';
            blockDiv.style.margin = '0 auto';
            blockDiv.style.padding = '0 2rem';
            // Image
            if (block.image) {
                const img = document.createElement('img');
                img.src = block.image;
                img.style.borderRadius = '10px';
                img.style.maxHeight = '260px';
                img.style.objectFit = 'cover';
                img.style.maxWidth = block.imageSize === 'small' ? '120px' : block.imageSize === 'large' ? '320px' : '200px';
                img.style.width = '100%';
                img.style.flex = '0 0 auto';
                blockDiv.appendChild(img);
            }
            // Text
            const textDiv = document.createElement('div');
            if (block.imagePosition === 'top' || !block.image) {
                textDiv.style.textAlign = 'center';
            } else {
                textDiv.style.textAlign = 'left';
            }
            if (block.title) {
                const title = document.createElement('div');
                title.textContent = block.title;
                title.style.fontSize = '2rem';
                title.style.fontWeight = 'bold';
                title.style.marginBottom = '0.7rem';
                textDiv.appendChild(title);
            }
            if (block.subtitle) {
                const subtitle = document.createElement('div');
                subtitle.textContent = block.subtitle;
                subtitle.style.fontSize = '1.2rem';
                subtitle.style.fontWeight = '500';
                subtitle.style.color = (bg === '#fff' || bg === '#f5f5f5') ? '#23272f' : '#b6c2d1';
                subtitle.style.marginBottom = '0.5rem';
                textDiv.appendChild(subtitle);
            }
            if (block.body) {
                const body = document.createElement('div');
                body.innerHTML = block.body.replace(/\n/g, '<br>');
                body.style.fontSize = '1.1rem';
                body.style.marginTop = '0.5rem';
                textDiv.appendChild(body);
            }
            blockDiv.appendChild(textDiv);
            section.appendChild(blockDiv);
            container.appendChild(section);
        });
    }
