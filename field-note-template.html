    <script>
        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCl4-CR0cDcInzgWnGJMPDHbBn6L1bWlRs",
            authDomain: "grey-cell-brief.firebaseapp.com",
            projectId: "grey-cell-brief",
            storageBucket: "grey-cell-brief.firebasestorage.app",
            messagingSenderId: "479300831529",
            appId: "1:479300831529:web:b295eb7803433fa69acf38",
            measurementId: "G-6GCYXKL6N0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Get the field note ID from the URL
        const urlParams = new URLSearchParams(window.location.search);
        const noteId = urlParams.get('id');
        
        if (noteId) {
            // Load field note from Firestore
            db.collection('fieldNotes').doc(noteId).get().then((doc) => {
                if (doc.exists) {
                    const note = doc.data();
                    // Update page title
                    document.title = note.title + ' - The Grey Cell Brief';
                    
                    // Update content
                    document.getElementById('fieldNoteTitle').textContent = note.title;
                    document.getElementById('fieldNoteDate').textContent = 'Published on ' + new Date(note.date).toLocaleDateString('en-US', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric'
                    });
                    document.getElementById('fieldNoteImage').src = note.image;
                    document.getElementById('fieldNoteImage').alt = note.title;
                    document.getElementById('fieldNoteContent').innerHTML = note.content;
                } else {
                    // Handle case where note doesn't exist
                    document.getElementById('fieldNoteTitle').textContent = 'Field Note Not Found';
                    document.getElementById('fieldNoteContent').innerHTML = '<p>The requested field note could not be found.</p>';
                }
            }).catch((error) => {
                console.error('Error loading field note:', error);
                document.getElementById('fieldNoteTitle').textContent = 'Error Loading Field Note';
                document.getElementById('fieldNoteContent').innerHTML = '<p>There was an error loading the field note. Please try again later.</p>';
            });
        } else {
            // Handle case where no note ID is provided
            document.getElementById('fieldNoteTitle').textContent = 'Invalid Field Note';
            document.getElementById('fieldNoteContent').innerHTML = '<p>No field note ID was provided.</p>';
        }
    </script>
